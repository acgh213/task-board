<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Task Board{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="/">⚡ Task Board</a>
        </div>
        <div class="nav-links">
            <a href="/">Dashboard</a>
            <a href="/">Tasks</a>
            <a href="/">Agents</a>
            <a href="/">Stats</a>
        </div>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer class="footer">
        <p>Hermes Task Board — Agent Task Queue</p>
    </footer>
    {% block scripts %}{% endblock %}
</body>
</html>
